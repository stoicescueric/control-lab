<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Control Lab">
  <rect x="2" y="2" width="36" height="36" rx="10" fill="url(#cl-grad)"/>
  <!-- setpoint (the target the controller converges to) -->
  <path d="M8 15 H32" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="0.5 3.5"/>
  <!-- underdamped step response: rise, overshoot, settle onto the setpoint -->
  <path d="M8 31 C 12.5 31 13.5 10 19 10 C 23 10 24 16 28 14.6 C 30.4 13.8 31 15 33 15" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="33" cy="15" r="2.7" fill="#ffffff"/>
  <defs>
    <linearGradient id="cl-grad" x1="2" y1="2" x2="38" y2="38" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6883f9"/>
      <stop offset="1" stop-color="#3a52d6"/>
    </linearGradient>
  </defs>
</svg>
